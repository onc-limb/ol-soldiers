name: ol-soldiers-style
description: ol-soldiers 思想を takt に翻案した反復型協調ワークフロー（目的確定 → タスク分割 → 並列最大 3 実装 → タスク評価 → 目的評価 → サイクル繰り返し → PR 作成で完結。情報不足や blocker はユーザーへ質問せず、PR 本文に明記する）
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 60
initial_step: intake
loop_monitors:
  - cycle:
      - plan_split
      - goal_review
    threshold: 3
    judge:
      persona: facilitator
      instruction: loop-monitor-cycle
      rules:
        - condition: 健全（進捗あり）
          next: plan_split
        - condition: 非生産的（改善なし・サイクル上限超過）
          next: pr_create
steps:
  - name: intake
    edit: false
    persona: commander
    instruction: intake
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    rules:
      - condition: 目的・Done を確定できた、または不足情報を assumptions / open_questions として記録した上で進められる
        next: plan_split
    output_contracts:
      report:
        - name: intake.md
          format: intake
  - name: plan_split
    edit: false
    persona: sergeant
    instruction: plan-split
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
    rules:
      - condition: タスク分割が完了した
        next: execute
    output_contracts:
      report:
        - name: plan-split.md
          format: plan-split
  - name: execute
    edit: true
    persona: sergeant
    instruction: execute-team-leader
    session: refresh
    required_permission_mode: edit
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
    team_leader:
      max_parts: 3
      part_persona: soldier
      part_edit: true
      part_permission_mode: edit
      part_allowed_tools:
        - Read
        - Glob
        - Grep
        - Edit
        - Write
        - Bash
    rules:
      - condition: 全タスクの実装が完了した、または blocker を execute.md に記録した上で次工程へ引き渡せる
        next: task_review
    output_contracts:
      report:
        - name: execute.md
          format: execute
  - name: task_review
    edit: false
    persona: task-inspector
    instruction: task-review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
    rules:
      - condition: any("needs_revision", "rejected")
        next: execute
      - condition: all("approved")
        next: completion_check
    output_contracts:
      report:
        - name: task-review.md
          format: task-review
  - name: completion_check
    edit: false
    persona: sergeant
    instruction: completion-check
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
    rules:
      - condition: 全タスクが approved で完了
        next: goal_review
      - condition: 未完了タスクがある
        next: execute
    output_contracts:
      report:
        - name: completion-check.md
          format: completion-check
  - name: goal_review
    edit: false
    persona: goal-inspector
    instruction: goal-review
    pass_previous_response: false
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
    rules:
      - condition: 目的達成 かつ テスト通過（approved）
        next: pr_create
      - condition: needs_more_cycles（追加サイクルで改善可能）
        next: summarize_cycle
      - condition: blocked（追加サイクルで解決不能）
        next: pr_create
    output_contracts:
      report:
        - name: goal-review.md
          format: goal-review
  - name: summarize_cycle
    edit: false
    persona: facilitator
    instruction: cycle-summary
    session: refresh
    pass_previous_response: false
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
    rules:
      - condition: サイクル要約が完了した
        next: plan_split
    output_contracts:
      report:
        - name: cycle-summary.md
          format: cycle-summary
  - name: pr_create
    edit: false
    persona: facilitator
    instruction: pr-create
    pass_previous_response: false
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
    rules:
      - condition: PR を作成しワークフローを完了する
        next: COMPLETE
    output_contracts:
      report:
        - name: pr-create.md
          format: pr-create
